<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Paper Tracker</title>
    <link rel="stylesheet" href="styles.css?v=3">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header class="mobile-header">
        <div class="wallet-info">
            <span class="wallet-label">Wallet</span>
            <strong id="walletAmount">0.000 SOL</strong>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="addFunds()">➕</button>
            <button class="icon-btn" onclick="resetWallet()">🔄</button>
            <button class="icon-btn" onclick="openStatsModal()">📊</button>
        </div>
    </header>

    <div class="app-container">
        <div id="openTradesTab" class="tab-content active">
            <section class="card new-trade-section">
                <h2>⚡ New Trade</h2>
                <form id="newTradeForm">
                    <div class="input-group">
                        <label for="ca">Contract Address (CA)</label>
                        <input type="text" id="ca" placeholder="Paste CA here..." required>
                    </div>
                    <div class="row-inputs">
                        <div class="input-group">
                            <label for="buyPrice">Buy (SOL)</label>
                            <input type="number" id="buyPrice" step="0.001" inputmode="decimal" placeholder="0.5" required>
                        </div>
                        <div class="input-group">
                            <label for="buyMC">Entry MC ($)</label>
                            <input type="number" id="buyMC" step="1" inputmode="numeric" placeholder="50000" required>
                        </div>
                    </div>
                    <div class="input-group" style="margin-top: 5px;">
                        <label for="tradeDate">Date</label>
                        <input type="date" id="tradeDate" required>
                    </div>
                    <button type="submit" id="addTradeBtn">Log Trade</button>
                </form>
            </section>

            <section class="open-trades-section">
                <h2 class="section-title">Open Positions</h2>
                <div id="openTradesList"></div>
            </section>
        </div>

        <div id="todayTradesTab" class="tab-content">
            <section class="history-section">
                <h2 class="section-title">Today's PnL</h2>
                <div id="todayHistoryList"></div>
            </section>
        </div>

        <div id="historyTab" class="tab-content">
            <section class="history-section">
                <h2 class="section-title">All History</h2>
                <div id="allHistoryList"></div>
            </section>
        </div>
    </div>

    <div id="statsModal" class="modal">
        <div class="modal-content calendar-modal">
            <div class="modal-header">
                <h2>PNL Calendar</h2>
                <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
                    <button class="btn-small" style="background: var(--border-color); color: #fff; border:none; padding: 6px 10px; border-radius: 4px;" onclick="exportData()">💾 Backup</button>
                    <button class="btn-small" style="background: var(--border-color); color: #fff; border:none; padding: 6px 10px; border-radius: 4px;" onclick="document.getElementById('importFile').click()">📂 Restore</button>
                    <input type="file" id="importFile" style="display:none" onchange="importData(event)" accept=".json">
                    <span class="close" onclick="closeStatsModal()">&times;</span>
                </div>
            </div>
            
            <div class="calendar-controls">
                <button onclick="changeMonth(-1)">&#8592;</button>
                <h3 id="calendarMonthLabel" style="color: #fff;">Month Year</h3>
                <button onclick="changeMonth(1)">&#8594;</button>
            </div>

            <div class="calendar-header-days">
                <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('openTradesTab', this)">
            <div class="nav-icon">⚡</div>
            <span>Trade</span>
        </button>
        <button class="nav-item" onclick="switchTab('todayTradesTab', this)">
            <div class="nav-icon">🎯</div>
            <span>Today</span>
        </button>
        <button class="nav-item" onclick="switchTab('historyTab', this)">
            <div class="nav-icon">📚</div>
            <span>History</span>
        </button>
    </nav>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</body>
</html>
